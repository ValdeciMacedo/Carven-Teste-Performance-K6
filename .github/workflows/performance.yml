name: CI/CD - K6 Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  ci-tests:
    name: CI - k6 tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt update
          sudo apt install -y k6

      - name: Run k6 test
        run: k6 run script.js

  cd-deploy:
    name: CD - Deploy
    runs-on: ubuntu-latest
    needs: ci-tests

    steps:
      - uses: actions/checkout@v4

      - name: Deploy step
        run: echo "🚀 Deploy executado com sucesso"